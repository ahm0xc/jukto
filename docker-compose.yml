services:
  manager:
    build: ./manager
    ports:
      - "8899:8899"
    environment:
      - MANAGER_ADMIN_PASSWORD=${MANAGER_ADMIN_PASSWORD}
      - PROXIES=https://proxy.jukto.pw
      - MANAGER_DB_PATH=/data/manager.db
    volumes:
      - manager-data:/data
    restart: unless-stopped

  proxy:
    build: ./proxy
    ports:
      - "3000:3000"
    environment:
      - MANAGER_URL=http://manager:8899
      - PUBLIC_URL=https://proxy.jukto.pw
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    depends_on:
      - manager
    restart: unless-stopped

  caddy:
    image: caddy:latest
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - manager
      - proxy
    restart: unless-stopped

volumes:
  manager-data:
  caddy-data:
