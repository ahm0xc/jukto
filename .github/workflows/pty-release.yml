name: Build & Release PTY

on:
  push:
    branches: [main]
    paths: ['pty/**', '.github/workflows/pty-release.yml']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux:x64
            artifact: jukto-pty-linux-x8664-0
            binary: jukto-pty
          - os: macos-latest
            target: darwin:arm64
            artifact: jukto-pty-macos-arm64-0
            binary: jukto-pty
          - os: windows-latest
            target: win32:x64
            artifact: jukto-pty-windows-x8664-1.exe
            binary: jukto-pty.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release
        working-directory: pty

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: pty/target/release/${{ matrix.binary }}

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        shell: bash
        run: |
          for dir in artifacts/*/; do
            artifact_name="$(basename "$dir")"
            # The directory name is the artifact name (e.g. jukto-pty-macos-arm64-0)
            # Inside, the binary has a generic name (jukto-pty or jukto-pty.exe)
            # We rename it to match the artifact name
            for file in "$dir"*; do
              ext=""
              case "$file" in
                *.exe) ext=".exe" ;;
              esac
              # If the artifact name already has the right extension, use as-is
              if [[ "$artifact_name" == *"$ext" ]]; then
                mv "$file" "/tmp/${artifact_name}"
              else
                mv "$file" "/tmp/${artifact_name}${ext}"
              fi
            done
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0
          name: PTY Binaries
          body: Auto-built from main
          files: /tmp/jukto-pty-*
          fail_on_unmatched: false
